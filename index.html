<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaInfo Card Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f1117;
      font-family: 'Sora', sans-serif;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px;
      gap: 24px;
    }

    .app-header {
      text-align: center;
    }

    .app-header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #4f8ef7;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    .app-header p {
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 5px;
    }

    .editor-wrap {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 1100px;
      align-items: flex-start;
    }

    textarea {
      flex: 1;
      min-height: 230px;
      background: #161b27;
      border: 1px solid #252d40;
      border-radius: 10px;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      line-height: 1.75;
      padding: 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #4f8ef7;
    }

    textarea::placeholder {
      color: #3d4f6e;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 11px 20px;
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      font-size: 0.76rem;
      letter-spacing: 0.04em;
      transition: all 0.17s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #4f8ef7;
      color: #fff;
    }

    .btn-primary:hover {
      background: #6ba3ff;
      transform: translateY(-1px);
    }

    .btn-png {
      background: #22c55e;
      color: #fff;
    }

    .btn-png:hover {
      background: #4ade80;
      transform: translateY(-1px);
    }

    .btn-png:disabled {
      background: #166534;
      color: #4ade80;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #1e2740;
      color: #94a3b8;
      border: 1px solid #252d40;
    }

    .btn-secondary:hover {
      background: #252d40;
      color: #e2e8f0;
    }



    /* CARD */
    .result-wrap {
      width: 100%;
      max-width: 1100px;
    }

    #mediaCard {
      background: linear-gradient(135deg, #1e2533 0%, #11151f 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      font-family: 'Sora', sans-serif;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .card-header {
      background: rgba(0, 0, 0, 0.2);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4f8ef7;
      box-shadow: 0 0 10px rgba(79, 142, 247, 0.5);
      flex-shrink: 0;
    }

    .filename {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 700;
      color: #f7c94f;
      word-break: break-all;
      letter-spacing: -0.01em;
    }

    .card-body {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
    }

    .section {
      padding: 24px;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .section:last-child {
      border-right: none;
    }

    .section-title {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 18px;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      display: block;
      width: 3px;
      height: 12px;
      border-radius: 2px;
      background: currentColor;
    }

    .section-general .section-title {
      color: #4f8ef7;
    }

    .section-video .section-title {
      color: #22c55e;
    }

    .section-audio .section-title {
      color: #f97316;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }

    .lbl {
      font-size: 0.7rem;
      color: #94a3b8;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .val {
      font-size: 0.74rem;
      font-weight: 600;
      color: #ffffff;
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
    }

    .audio-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.74rem;
      color: #ffffff;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 9px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.03);
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .flag-img-card {
      width: 24px;
      height: 16px;
      border-radius: 2px;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .flag-initials {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 16px;
      background: #1e2740;
      border-radius: 2px;
      font-size: 0.5rem;
      font-weight: 700;
      color: #94a3b8;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid #252d40;
      flex-shrink: 0;
    }

    .subs-section {
      background: rgba(0, 0, 0, 0.15);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .subs-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: #64748b;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    .sub-flag-group {
      display: flex;
      gap: 5px;
      align-items: center;
      flex-wrap: wrap;
    }

    .sub-flag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 16px;
      border-radius: 3px;
      background: #1e2740;
      border: 1px solid #252d40;
      overflow: hidden;
    }

    .sub-flag img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sub-flag-init {
      font-size: 0.5rem;
      font-weight: 700;
      color: #64748b;
      font-family: 'JetBrains Mono', monospace;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      justify-content: flex-end;
    }

    #output-card {
      display: none;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      color: #f87171;
      font-size: 0.76rem;
      display: none;
      width: 100%;
      max-width: 1100px;
    }

    .tip {
      font-size: 0.67rem;
      color: #3d4f6e;
      text-align: center;
      line-height: 1.8;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="app-header">
    <h1>MediaInfo Card Generator</h1>
    <p>Paste MediaInfo text → Generate card → Download PNG</p>
  </div>

  <div class="editor-wrap">
    <textarea id="inputText" placeholder="Paste MediaInfo text here...
(General, Video, Audio, Text sections)"></textarea>
    <div class="btn-group">
      <button class="btn-primary" onclick="convert()">▶ Generate</button>

      <button class="btn-secondary" onclick="clearAll()">✕ Clear</button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>



  <!-- OUTPUT CARD -->
  <div class="result-wrap" id="output-card">
    <div id="mediaCard">
      <div class="card-header">
        <div class="dot"></div>
        <div class="filename" id="outFilename">—</div>
      </div>
      <div class="card-body">
        <div class="section section-general" id="secGeneral">
          <div class="section-title">📁 General</div>
        </div>
        <div class="section section-video" id="secVideo">
          <div class="section-title">🎬 Video</div>
        </div>
        <div class="section section-audio" id="secAudio">
          <div class="section-title">🔊 Audio</div>
        </div>
      </div>
      <div class="subs-section" id="secSubs">
        <span class="subs-label">💬 Subtitles</span>
        <div class="sub-flag-group" id="subFlags"></div>
      </div>
    </div>
    <div class="action-row">
      <button class="btn-secondary" onclick="convert()">↺ Re-render</button>
      <button class="btn-png" id="pngBtn" onclick="exportPNG()">⬇ Download PNG</button>
    </div>
  </div>



  <script>
    // ─────────────────────────────────────────────────────────────
    // MAPPING language → ISO 3166-1 alpha-2 country code
    // Flag filenames in the flags/ folder must match these codes
    // Example: "English" → "gb" → flags/gb.png
    // Add new lines here for additional languages
    // ─────────────────────────────────────────────────────────────
    const LANG_TO_CODE = {
      // East Asia
      'mandarin': 'cn',
      'chinese': 'cn',
      'hans': 'cn',   // Simplified Chinese → China
      'hant': 'tw',   // Traditional Chinese → Taiwan
      'cantonese': 'hk',
      'japanese': 'jp',
      'korean': 'kr',

      // Southeast Asia
      'indonesian': 'id',
      'bahasa': 'id',
      'malay': 'my',
      'malaysian': 'my',
      'thai': 'th',
      'vietnamese': 'vn',
      'filipino': 'ph',
      'tagalog': 'ph',
      'burmese': 'mm',
      'khmer': 'kh',
      'cambodian': 'kh',
      'lao': 'la',

      // South Asia
      'hindi': 'in',
      'tamil': 'in',
      'telugu': 'in',
      'sinhala': 'lk',
      'nepali': 'np',
      'bengali': 'bd',
      'urdu': 'pk',

      // Middle East
      'arabic': 'sa',
      'persian': 'ir',
      'hebrew': 'il',
      'turkish': 'tr',

      // Western Europe
      'english': 'gb',
      'french': 'fr',
      'german': 'de',
      'spanish': 'es',
      'portuguese': 'pt',
      'italian': 'it',
      'dutch': 'nl',
      'greek': 'gr',

      // Northern & Eastern Europe
      'swedish': 'se',
      'norwegian': 'no',
      'danish': 'dk',
      'finnish': 'fi',
      'russian': 'ru',
      'ukrainian': 'ua',
      'polish': 'pl',
      'czech': 'cz',
      'hungarian': 'hu',
      'romanian': 'ro',
      'bulgarian': 'bg',
    };

    // Flags folder (relative to this HTML file)
    const FLAGS_FOLDER = 'flags/';
    // Attempted extensions in sequence
    const FLAG_EXTS = ['png', 'jpg', 'jpeg', 'webp', 'svg'];

    // Cache: countryCode → dataUrl | null
    const flagCache = {};

    let parsedSections = [];

    // ─────────────────────────────────────────────────────────────
    // SAMPLE DATA
    // ─────────────────────────────────────────────────────────────


    // ─────────────────────────────────────────────────────────────
    // PARSER
    // ─────────────────────────────────────────────────────────────
    function parseSections(text) {
      const lines = text.split('\n');
      const sections = [];
      let current = null;
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        if (/^(General|Video|Audio\s*#?\d*|Text\s*#?\d*|Image|Menu)$/i.test(trimmed)) {
          current = { type: trimmed, fields: {} };
          sections.push(current);
        } else if (current && line.includes(':')) {
          const idx = line.indexOf(':');
          const key = line.substring(0, idx).trim();
          const val = line.substring(idx + 1).trim();
          if (key && val) current.fields[key] = val;
        }
      }
      return sections;
    }

    function getField(fields, ...keys) {
      for (const k of keys) {
        const found = Object.keys(fields).find(fk => fk.toLowerCase().includes(k.toLowerCase()));
        if (found) return fields[found];
      }
      return null;
    }

    function langToCode(lang) {
      if (!lang) return null;
      const l = lang.toLowerCase();
      for (const [keyword, code] of Object.entries(LANG_TO_CODE)) {
        if (l.includes(keyword)) return code;
      }
      return null;
    }

    // ─────────────────────────────────────────────────────────────
    // FLAG LOADER
    // Attempts to load flags/{code}.png, .jpg, .jpeg, .webp, .svg
    // Converts to dataUrl so html2canvas can capture them
    // ─────────────────────────────────────────────────────────────
    function loadFlag(code) {
      if (!code) return Promise.resolve(null);
      if (flagCache[code] !== undefined) return Promise.resolve(flagCache[code]);

      const tryExt = (i) => {
        if (i >= FLAG_EXTS.length) {
          flagCache[code] = null;
          return Promise.resolve(null);
        }
        const path = `${FLAGS_FOLDER}${code}.${FLAG_EXTS[i]}`;
        return new Promise(resolve => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth || 40;
            canvas.height = img.naturalHeight || 28;
            canvas.getContext('2d').drawImage(img, 0, 0);
            flagCache[code] = canvas.toDataURL('image/png');
            resolve(flagCache[code]);
          };
          img.onerror = () => resolve(tryExt(i + 1));
          img.src = path;
        });
      };
      return tryExt(0);
    }

    async function loadAllFlags(codes) {
      await Promise.all([...new Set(codes.filter(Boolean))].map(c => loadFlag(c)));
    }

    // ─────────────────────────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────────────────────────
    function makeRow(lbl, val) {
      if (!val) return '';
      return `<div class="row"><span class="lbl">${lbl}</span><span class="val">${val}</span></div>`;
    }

    function flagImgTag(dataUrl, alt) {
      if (dataUrl) {
        return `<img class="flag-img-card" src="${dataUrl}" width="24" height="16" alt="${alt}">`;
      }
      const initials = (alt || '?').replace(/\s*\(.*\)/, '').trim().substring(0, 2).toUpperCase();
      return `<span class="flag-initials">${initials}</span>`;
    }

    function subFlagHtml(dataUrl, lang) {
      const initials = (lang || '?').replace(/\s*\(.*\)/, '').trim().substring(0, 2).toUpperCase();
      return `<div class="sub-flag" title="${lang}">` + (
        dataUrl
          ? `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover" alt="${lang}">`
          : `<span class="sub-flag-init">${initials}</span>`
      ) + `</div>`;
    }

    // ─────────────────────────────────────────────────────────────
    // MAIN CONVERT
    // ─────────────────────────────────────────────────────────────
    async function convert() {
      const text = document.getElementById('inputText').value.trim();
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';

      if (!text) {
        errEl.textContent = 'Please paste MediaInfo text first!';
        errEl.style.display = 'block';
        return;
      }

      parsedSections = parseSections(text);
      if (!parsedSections.length) {
        errEl.textContent = 'Unable to parse MediaInfo. Please ensure the format is correct.';
        errEl.style.display = 'block';
        return;
      }

      const general = parsedSections.find(s => /^general$/i.test(s.type));
      const video = parsedSections.find(s => /^video$/i.test(s.type));
      const texts = parsedSections.filter(s => /^text/i.test(s.type));
      const audioSecs = parsedSections.filter(s => /^audio/i.test(s.type));

      // Collect all languages
      const allLangs = [
        ...audioSecs.map(a => getField(a.fields, 'Language') || ''),
        ...texts.map(t => getField(t.fields, 'Language') || ''),
      ];
      const allCodes = allLangs.map(l => langToCode(l));

      // Load all flags from disk
      await loadAllFlags(allCodes);



      // ── Build card ──

      // Filename
      const fullname = general ? (getField(general.fields, 'Complete name', 'Filename', 'Name') || '') : '';
      const parts = fullname.replace(/\\/g, '/').split('/');
      document.getElementById('outFilename').textContent = parts[parts.length - 1] || fullname || 'Unknown file';

      // General
      let gHtml = '<div class="section-title">📁 General</div>';
      if (general) {
        const f = general.fields;
        gHtml += makeRow('Format', getField(f, 'Format'));
        gHtml += makeRow('Duration', getField(f, 'Duration'));
        gHtml += makeRow('Bitrate', getField(f, 'Overall bit rate', 'Overall bitrate'));
        gHtml += makeRow('Size', getField(f, 'File size', 'Size'));
      }
      document.getElementById('secGeneral').innerHTML = gHtml;

      // Video
      let vHtml = '<div class="section-title">🎬 Video</div>';
      if (video) {
        const f = video.fields;
        const fmt = getField(f, 'Format/Info', 'Format') || '';
        const depth = getField(f, 'Bit depth');
        vHtml += makeRow('Format', fmt + (depth ? ` (${depth} bits)` : ''));
        const w = (getField(f, 'Width') || '').replace(/\s*pixels/i, '').replace(/\s/g, '');
        const h = (getField(f, 'Height') || '').replace(/\s*pixels/i, '').replace(/\s/g, '');
        if (w && h) vHtml += makeRow('Resolution', `${w} × ${h}`);
        vHtml += makeRow('Aspect ratio', getField(f, 'Display aspect ratio'));
        vHtml += makeRow('Frame rate', getField(f, 'Frame rate'));
        vHtml += makeRow('Bit rate', getField(f, 'Bit rate'));
      }
      document.getElementById('secVideo').innerHTML = vHtml;

      // Audio
      let aHtml = '<div class="section-title">🔊 Audio</div>';
      audioSecs.forEach(a => {
        const f = a.fields;
        const lang = getField(f, 'Language') || 'Unknown';
        const code = langToCode(lang);
        const dataUrl = code ? (flagCache[code] || null) : null;
        const fmt = getField(f, 'Commercial name', 'Format') || '';
        const layout = getField(f, 'Channel layout') || '';
        const chRaw = getField(f, 'Channel(s)', 'Channels') || '';
        let ch = '';
        if (layout) {
          const p = layout.trim().split(/\s+/);
          const lfe = p.filter(x => x === 'LFE').length;
          ch = `${p.length - lfe}.${lfe}ch`;
        } else if (chRaw) {
          ch = chRaw.replace(' channels', 'ch');
        }
        const br = getField(f, 'Bit rate') || '';
        aHtml += `<div class="audio-item">${flagImgTag(dataUrl, lang)} <span>${lang} / ${fmt} / ${ch} / ${br}</span></div>`;
      });
      if (!audioSecs.length) aHtml += '<span style="color:#64748b;font-size:0.71rem">No audio track found</span>';
      document.getElementById('secAudio').innerHTML = aHtml;

      // Subtitles
      const subsEl = document.getElementById('secSubs');
      if (texts.length) {
        subsEl.style.display = 'flex';
        document.getElementById('subFlags').innerHTML = texts.map(t => {
          const lang = getField(t.fields, 'Language') || '';
          const code = langToCode(lang);
          const dataUrl = code ? (flagCache[code] || null) : null;
          return subFlagHtml(dataUrl, lang);
        }).join('');
      } else {
        subsEl.style.display = 'none';
      }

      document.getElementById('output-card').style.display = 'block';
    }

    // ─────────────────────────────────────────────────────────────
    // EXPORT PNG
    // ─────────────────────────────────────────────────────────────
    async function exportPNG() {
      const btn = document.getElementById('pngBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Generating...';
      await new Promise(r => setTimeout(r, 100));
      try {
        const card = document.getElementById('mediaCard');
        const canvas = await html2canvas(card, {
          backgroundColor: '#161b27',
          scale: 4,
          useCORS: true,
          allowTaint: true,
          logging: false,
        });
        const link = document.createElement('a');
        const fname = (document.getElementById('outFilename').textContent || 'mediainfo').replace(/\.[^.]+$/, '');
        link.download = fname + '_mediainfo.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (e) {
        alert('Export failed: ' + e.message);
      }
      btn.disabled = false;
      btn.innerHTML = '⬇ Download PNG';
    }



    function clearAll() {
      document.getElementById('inputText').value = '';

      document.getElementById('output-card').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'none';
      parsedSections = [];
    }
  </script>
</body>

</html>
